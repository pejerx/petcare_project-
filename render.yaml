services:
  # ── Backend (Spring Boot) ──────────────────────────────────────────────────
  - type: web
    name: petcare-backend
    runtime: java
    plan: free
    rootDir: backend/petcare-backend
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        value: jdbc:postgresql://ep-falling-violet-aisscdsu-pooler.c-4.us-east-1.aws.neon.tech/neondb?sslmode=require&channel_binding=require
      - key: DATABASE_USERNAME
        value: neondb_owner
      - key: DATABASE_PASSWORD
        value: npg_0cZKwE3bhjSI
      - key: CORS_ALLOWED_ORIGINS
        value: https://petcare-frontend.onrender.com

  # ── Frontend (React + Vite) ────────────────────────────────────────────────
  - type: web
    name: petcare-frontend
    runtime: static
    plan: free
    rootDir: frontend/petcare1
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://petcare-backend.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
